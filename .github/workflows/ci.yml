name: CI

# Trigger model:
#   - pull_request: run only the `test` job for fast logic validation.
#   - push to main: also run the `build` matrix to catch any
#     platform-specific compile error before a release tag.
# release.yml owns the multi-platform build + publish at tag time.
on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'

# Cancel any in-progress run for the same branch when a new commit is pushed,
# so back-to-back pushes don't pile up wasted matrix runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for JavaScript actions ahead of the 2026-06-02 default
# switch, silencing the deprecation warning emitted by actions/checkout@v4 etc.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  build:
    # Only run the multi-platform build matrix on push to main (post-merge),
    # not on every PR push. PR validation is handled by the `test` job above.
    if: github.event_name == 'push'
    needs: test
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: cargo install cross
      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

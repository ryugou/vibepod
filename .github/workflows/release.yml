name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross
      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="vibepod-${VERSION}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" vibepod
          cd ../../..
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibepod-${{ matrix.target }}
          path: |
            vibepod-*.tar.gz
            vibepod-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vibepod-*.tar.gz
            vibepod-*.tar.gz.sha256

  publish-crate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish 2>&1 | tee /tmp/cargo-publish.log || { grep -q 'already exists' /tmp/cargo-publish.log && echo "Version already published, skipping" || exit 1; }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets and compute checksums
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/ryugou/vibepod/releases/download/v${VERSION}"
          TARGETS=("aarch64-apple-darwin" "x86_64-apple-darwin" "aarch64-unknown-linux-gnu" "x86_64-unknown-linux-gnu")
          for target in "${TARGETS[@]}"; do
            curl -fSL -o "vibepod-${VERSION}-${target}.tar.gz" "${BASE_URL}/vibepod-${VERSION}-${target}.tar.gz"
          done
      - name: Generate and push Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE_URL="https://github.com/ryugou/vibepod/releases/download/v${VERSION}"

          SHA_DARWIN_ARM=$(sha256sum "vibepod-${VERSION}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')
          SHA_DARWIN_X86=$(sha256sum "vibepod-${VERSION}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum "vibepod-${VERSION}-aarch64-unknown-linux-gnu.tar.gz" | awk '{print $1}')
          SHA_LINUX_X86=$(sha256sum "vibepod-${VERSION}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')

          cat > vibepod.rb <<EOF
          class Vibepod < Formula
            desc "Safely run AI coding agents in Docker containers"
            homepage "https://github.com/ryugou/vibepod"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/vibepod-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM}"
              else
                url "${BASE_URL}/vibepod-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/vibepod-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "${BASE_URL}/vibepod-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "vibepod"
              bin.install_symlink "vibepod" => "vp"
            end

            test do
              assert_match "vibepod", shell_output("#{bin}/vibepod --version")
            end
          end
          EOF
          sed -i 's/^          //' vibepod.rb

          git clone "https://x-access-token:${GH_TOKEN}@github.com/ryugou/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp vibepod.rb tap/Formula/vibepod.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vibepod.rb
          git diff --cached --quiet && echo "No changes" || (git commit -m "vibepod ${VERSION}" && git push)

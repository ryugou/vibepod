# Python review bundle — read-only evaluation of Python code. Reviewer
# agents + santa-method dual-convergence skill. Complements python/impl.
#
# Scope: Python 3.11+, framework-agnostic (no Django/Flask/FastAPI
# review). Pulled skills/agents are sourced from ~/.config/vibepod/
# ecc-cache/ at container start; missing entries fail-fast.

[runtime]
required_langs = ["python"]

[ecc]
skills = [
  "skills/santa-method/SKILL.md",
]
agents = [
  "agents/python-reviewer.md",
  "agents/security-reviewer.md",
  "agents/silent-failure-hunter.md",
  "agents/code-reviewer.md",
]

# Generic (language-agnostic) review bundle — vibepod v1.6+.
#
# Selected by `vibepod run --mode review` when no --lang is specified
# and cwd auto-detection finds no recognized project files. Uses
# language-agnostic reviewer agents plus santa-method.
#
# required_langs is intentionally empty — reviewers read code without
# compiling. Pulled skills/agents are sourced from ~/.config/vibepod/
# ecc-cache/ at container start; missing entries fail-fast.

[runtime]
required_langs = []

[ecc]
skills = [
  "skills/santa-method/SKILL.md",
]
agents = [
  "agents/code-reviewer.md",
  "agents/security-reviewer.md",
  "agents/silent-failure-hunter.md",
]
